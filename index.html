<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse — Biology Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        dark: {
                            900: '#070908',
                            800: '#111513',
                            700: '#1C221F',
                            600: '#2A332E',
                        },
                        accent: {
                            green: '#2ECA45',
                            hover: '#3BE855',
                            glow: 'rgba(46, 202, 69, 0.2)'
                        }
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(46, 202, 69, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #070908; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A332E; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f4d45; }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Sidebar transition */
        #sidebar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        #sidebar.collapsed { width: 72px; }
        #sidebar.expanded  { width: 288px; }

        /* Hide text labels when collapsed */
        #sidebar.collapsed .sidebar-label,
        #sidebar.collapsed .sidebar-section-title,
        #sidebar.collapsed .sidebar-badge,
        #sidebar.collapsed .sidebar-bottom-btn-text,
        #sidebar.collapsed .sidebar-search,
        #sidebar.collapsed .sidebar-brand-text { display: none; }

        /* Center icons when collapsed */
        #sidebar.collapsed .sidebar-nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
        #sidebar.collapsed .sidebar-subject-item { justify-content: center; }
        #sidebar.collapsed .sidebar-brand { justify-content: center; padding: 24px 0; }
        #sidebar.collapsed .sidebar-bottom { padding: 16px 12px; }
        #sidebar.collapsed .sidebar-bottom-btn { justify-content: center; }

        /* Toggle button */
        #sidebarToggle {
            position: absolute; right: -12px; top: 28px; width: 24px; height: 24px;
            background: #1C221F; border: 1px solid #2A332E; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 20; transition: all 0.2s; color: #6b7c72;
        }

        #sidebarToggle:hover { background: #2A332E; color: #fff; }
        #sidebarToggle iconify-icon { transition: transform 0.3s; font-size: 12px; }
        #sidebar.collapsed #sidebarToggle iconify-icon { transform: rotate(180deg); }

        /* Tooltip for collapsed state */
        #sidebar.collapsed [data-tooltip] { position: relative; }
        #sidebar.collapsed [data-tooltip]:hover::after {
            content: attr(data-tooltip); position: absolute; left: calc(100% + 12px); top: 50%;
            transform: translateY(-50%); background: #1C221F; border: 1px solid #2A332E;
            color: #fff; font-size: 12px; font-weight: 500; padding: 5px 10px;
            border-radius: 6px; white-space: nowrap; z-index: 100; pointer-events: none;
        }

        /* --- THE ONLY CSS ADDED: So the AI's chat bubbles match your theme --- */
        .message { display: flex; gap: 16px; margin-bottom: 24px; max-width: 900px; margin-left: auto; margin-right: auto; width: 100%; }
        .message.user { flex-direction: row-reverse; }
        .avatar { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; border: 1px solid #2A332E; }
        .message.ai .avatar { background: #1C221F; color: #2ECA45; font-size: 20px; box-shadow: 0 0 15px rgba(46, 202, 69, 0.1); }
        .message.user .avatar { background: #2ECA45; color: #070908; }
        .bubble { padding: 18px 24px; border-radius: 16px; font-size: 15px; line-height: 1.7; width: 100%; border: 1px solid #2A332E; }
        .message.ai .bubble { background: #111513; color: #e5e7eb; border-top-left-radius: 4px; }
        .message.user .bubble { background: #1C221F; color: #ffffff; border-top-right-radius: 4px; }
        .bubble p { margin-bottom: 12px; margin-top: 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { color: #2ECA45; }
    </style>
</head>
<body>
    <div class="min-h-screen w-full flex overflow-hidden relative" style="height:100vh;">

        <div class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-accent-glow rounded-full blur-[150px] pointer-events-none z-0"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-accent-glow rounded-full blur-[120px] pointer-events-none z-0 opacity-50"></div>

        <aside id="sidebar" class="expanded bg-dark-800/80 backdrop-blur-xl border-r border-dark-600 flex flex-col h-full z-10 relative flex-shrink-0">

            <button id="sidebarToggle" onclick="toggleSidebar()">
                <iconify-icon icon="lucide:chevron-left"></iconify-icon>
            </button>

            <div class="sidebar-brand p-6 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-dark-700 border border-dark-600 flex items-center justify-center text-accent-green shadow-glow flex-shrink-0">
                    <iconify-icon icon="lucide:dna" class="text-2xl"></iconify-icon>
                </div>
                <div class="sidebar-brand-text">
                    <h1 class="text-xl font-bold tracking-tight">Syn<span class="text-accent-green">apse</span></h1>
                    <p class="text-xs text-gray-400 font-medium">Biology Tutor</p>
                </div>
            </div>

            <div class="sidebar-search px-4 mb-6">
                <div class="relative">
                    <iconify-icon icon="lucide:search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></iconify-icon>
                    <input type="text" placeholder="Search lessons..." class="w-full bg-dark-700 border border-dark-600 rounded-lg py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:border-accent-green transition-all placeholder-gray-500">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-4 pb-24 space-y-8">

                <div>
                    <h2 class="sidebar-section-title text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">Menu</h2>
                    <nav class="space-y-1">
                        <a href="#" data-tooltip="Dashboard" class="sidebar-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg bg-dark-600 text-white group">
                            <iconify-icon icon="lucide:layout-dashboard" class="text-accent-green flex-shrink-0 text-lg"></iconify-icon>
                            <span class="sidebar-label text-sm font-medium">Dashboard</span>
                        </a>
                        <a href="#" data-tooltip="My Journey" class="sidebar-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-colors group">
                            <iconify-icon icon="lucide:map" class="group-hover:text-accent-green transition-colors flex-shrink-0 text-lg"></iconify-icon>
                            <span class="sidebar-label text-sm font-medium">My Journey</span>
                        </a>
                    </nav>
                </div>

                <div>
                    <h2 class="sidebar-section-title text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">Recent Sessions</h2>
                    <div id="sessionsList" class="space-y-1">
                        </div>
                </div>

            </div>

            <div class="sidebar-bottom absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-dark-800 via-dark-800 to-transparent">
                <button onclick="newSession()" class="sidebar-bottom-btn w-full flex items-center justify-center gap-2 bg-accent-green hover:bg-accent-hover text-dark-900 font-bold py-3 px-4 rounded-xl shadow-glow transition-all active:scale-95">
                    <iconify-icon icon="lucide:sparkles" class="text-lg flex-shrink-0"></iconify-icon>
                    <span class="sidebar-bottom-btn-text sidebar-label">New Session</span>
                </button>
            </div>

        </aside>

        <main class="flex-1 flex flex-col h-full relative z-10 overflow-hidden">

            <header class="h-20 flex items-center justify-between px-8 bg-dark-900/50 backdrop-blur-sm border-b border-dark-600/50 sticky top-0 z-20 flex-shrink-0">
                <div class="flex flex-col">
                    <h2 class="text-xl font-bold" id="greetingText">Good morning, Harsh! 👋</h2>
                    <p class="text-sm text-gray-400">Ready to explore biology today?</p>
                </div>

                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2 bg-dark-700/50 border border-dark-600 px-3 py-1.5 rounded-full">
                        <iconify-icon icon="lucide:flame" class="text-orange-500 text-lg"></iconify-icon>
                        <span class="text-sm font-bold" id="streakCount">0 Day Streak</span>
                    </div>

                    <div class="flex items-center gap-3 pl-4 border-l border-dark-600 cursor-pointer">
                        <div class="text-right hidden md:block">
                            <p class="text-sm font-semibold" id="profileName">Harsh</p>
                            <p class="text-xs text-accent-green" id="profileLevel">Level 2 — Class 9</p>
                        </div>
                        <div class="w-10 h-10 rounded-full border-2 border-dark-600 bg-dark-700 flex items-center justify-center text-accent-green font-bold" id="profileAvatar">H</div>
                    </div>
                </div>
            </header>

            <div id="messages" class="flex-1 overflow-y-auto p-8">
                <div class="max-w-6xl mx-auto space-y-6">

                    <section class="bg-dark-800 border border-dark-600 rounded-2xl p-8 relative overflow-hidden">
                        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 20px 20px;"></div>

                        <div class="relative z-10 flex flex-col items-center text-center space-y-6 max-w-2xl mx-auto">
                            <div class="w-16 h-16 bg-dark-700 border border-dark-600 rounded-2xl flex items-center justify-center text-accent-green shadow-glow mb-2">
                                <iconify-icon icon="lucide:dna" class="text-4xl"></iconify-icon>
                            </div>
                            <h2 class="text-3xl font-bold tracking-tight">What do you want to understand today?</h2>
                            <p class="text-gray-400">Ask a question, dive into a concept, or continue where you left off.</p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full mt-4">
                                <button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-dark-700/50 border border-dark-600 hover:border-accent-green hover:bg-dark-700 transition-all text-sm text-gray-300 hover:text-white group">
                                    <iconify-icon icon="lucide:circle-dot" class="text-xl text-accent-green group-hover:scale-110 transition-transform"></iconify-icon>
                                    <span>Why does the cell need a nucleus?</span>
                                </button>
                                <button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-dark-700/50 border border-dark-600 hover:border-accent-green hover:bg-dark-700 transition-all text-sm text-gray-300 hover:text-white group">
                                    <iconify-icon icon="lucide:zap" class="text-xl text-yellow-400 group-hover:scale-110 transition-transform"></iconify-icon>
                                    <span>How does ATP actually work?</span>
                                </button>
                                <button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-dark-700/50 border border-dark-600 hover:border-accent-green hover:bg-dark-700 transition-all text-sm text-gray-300 hover:text-white group">
                                    <iconify-icon icon="lucide:split" class="text-xl text-blue-400 group-hover:scale-110 transition-transform"></iconify-icon>
                                    <span>Explain mitosis step by step</span>
                                </button>
                            </div>

                            <div class="w-full relative mt-6">
                                <input type="text" id="userInput" onkeypress="handleKey(event)" placeholder="Ask Synapse anything about biology..." class="w-full bg-dark-900 border border-dark-600 rounded-xl py-4 pl-14 pr-16 text-base focus:outline-none focus:border-accent-green focus:ring-1 focus:ring-accent-green transition-all placeholder-gray-500 shadow-inner">
                                <iconify-icon icon="lucide:sparkles" class="absolute left-5 top-1/2 -translate-y-1/2 text-accent-green text-xl"></iconify-icon>
                                <button id="sendBtn" onclick="sendMessage()" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-accent-green hover:bg-accent-hover text-dark-900 rounded-lg flex items-center justify-center transition-colors">
                                    <iconify-icon icon="lucide:arrow-right" class="text-xl font-bold"></iconify-icon>
                                </button>
                            </div>
                        </div>
                    </section>

                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

    <script>
        // ── Sidebar Toggle ──
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            sidebar.classList.toggle('expanded');
        }

        // ── Greeting based on time ──
        function setGreeting() {
            var hour = new Date().getHours();
            var greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
            var el = document.getElementById('greetingText');
            if (el) el.textContent = greeting + ', Harsh! 👋';
        }

        setGreeting();
    </script>
    <script src="script.js"></script> </body>
</body>
</html>
